services:
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ims}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ims}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-network

  redis:
    image: redis:7-alpine
    container_name: ims-redis-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ims-api-staging
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: staging
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ims}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    networks:
      - ims-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ims-web-staging
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - ims-network

networks:
  ims-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

# Continuous Integration: lint, typecheck, unit tests.
# PR-only — runs on pull_request events. Drafts are skipped via job-level `if`.
# E2E and Trivy live in dedicated main + schedule workflows (e2e.yml, security.yml)
# to keep per-PR Actions-minute consumption low.
# ⚠ To switch back to the self-hosted runner: replace every `runs-on: ubuntu-latest` with `runs-on: self-hosted`.

name: CI

# Force GitHub-bundled actions (checkout, setup-node, etc.) to run on Node.js 24
# instead of the deprecated Node.js 20. Safe to remove once action maintainers
# release Node.js 24 native versions (expected before June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".claude/**"
      - ".vscode/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name }}-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR title check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install commitlint
        run: npm install --no-save --no-audit --no-fund --prefix "$RUNNER_TEMP/commitlint" @commitlint/cli@19 @commitlint/config-conventional@19
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          # Let commitlint resolve `extends: ["@commitlint/config-conventional"]`
          # from the temp install, since the config file lives at the repo root.
          NODE_PATH: ${{ runner.temp }}/commitlint/node_modules
        run: |
          printf '%s\n' "$PR_TITLE" | "$RUNNER_TEMP/commitlint/node_modules/.bin/commitlint" --config commitlint.config.js

  # Detect which paths changed so test jobs can short-circuit when not relevant.
  # For PRs from forks, GITHUB_TOKEN has restricted API access; we set all outputs true so full CI runs.
  changes:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      api: ${{ steps.changes_filter.outputs.api || steps.fork_outputs.outputs.api }}
      web: ${{ steps.changes_filter.outputs.web || steps.fork_outputs.outputs.web }}
      tenant_site: ${{ steps.changes_filter.outputs.tenant_site || steps.fork_outputs.outputs.tenant_site }}
      shared: ${{ steps.changes_filter.outputs.shared || steps.fork_outputs.outputs.shared }}
      any: ${{ steps.changes_filter.outputs.any || steps.fork_outputs.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths (same-repo PR)
        id: changes_filter
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - "apps/api/**"
            web:
              - "apps/web/**"
            tenant_site:
              - "apps/tenant-site/**"
            shared:
              - "packages/**"
            any:
              - "apps/api/**"
              - "apps/web/**"
              - "apps/tenant-site/**"
              - "packages/**"
      - name: Set all changes for fork PR (no API access)
        id: fork_outputs
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "api=true" >> "$GITHUB_OUTPUT"
          echo "web=true" >> "$GITHUB_OUTPUT"
          echo "tenant_site=true" >> "$GITHUB_OUTPUT"
          echo "shared=true" >> "$GITHUB_OUTPUT"
          echo "any=true" >> "$GITHUB_OUTPUT"

  # Single consolidated static analysis job: lint + typecheck for every package.
  # Replaces the prior lint-api, lint-web, lint-tenant-site, and typecheck jobs
  # (each of which spent ~45–60s on its own pnpm install). Turbo's content-hash
  # cache skips unchanged packages so this is no slower than the old per-job split.
  static-checks:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event.pull_request.draft == false && needs.changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Guard Prisma migrations — tenant FK must reference tenants(id)
        run: |
          set -e
          if grep -R 'REFERENCES "tenants"("tenant_id")' apps/api/prisma/migrations --include='*.sql' 2>/dev/null; then
            echo "::error::Invalid FK in migration SQL: use REFERENCES \"tenants\"(\"id\"). The Tenant primary key column is id, not tenant_id."
            exit 1
          fi
          echo "Prisma migration tenant FK guard OK."
      - name: Generate Prisma client
        # check-types in apps/api needs the generated Prisma client.
        run: pnpm --filter api exec prisma generate
      - name: Lint and typecheck
        run: pnpm exec turbo run lint check-types
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  # Single consolidated unit-test job for the no-DB packages.
  # Replaces the prior test-web, test-tenant-site, and test-shared jobs.
  # Each package defines exactly one of `test` / `test:unit` / `test:run`; turbo
  # no-ops the tasks a package doesn't define.
  # The tenant-site Next.js build that previously ran here was removed — `tsc`
  # already covers type drift, and the production build runs in build-push-staging.yml on main.
  test-node:
    name: Test (web + tenant-site + shared)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event.pull_request.draft == false && (
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.tenant_site == 'true' ||
        needs.changes.outputs.shared == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run unit tests (web/tenant-site/shared)
        run: pnpm exec turbo run test test:unit test:run --filter=web --filter=tenant-site --filter=@repo/shared
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  # API tests stay in their own job because they need postgres + redis service
  # containers and run prisma migrations against a real DB (which is also where
  # we enforce the schema-drift guard).
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event.pull_request.draft == false && (
        needs.changes.outputs.api == 'true' ||
        needs.changes.outputs.shared == 'true'
      )
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
      - name: Run migrations
        run: pnpm --filter api exec prisma migrate deploy
      - name: Guard Prisma schema drift — migrations must match schema.prisma
        # Compares the migrated DB to schema.prisma. Exits 2 if anything in the
        # schema isn't expressed by a migration (or vice versa) — catches the
        # "added a field without generating a migration" footgun.
        run: |
          pnpm --filter api exec prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code
      - name: Run API tests
        run: pnpm exec turbo run test:coverage --filter=api
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

# Continuous Integration: lint, test, typecheck, and security scan.
# No Docker build/push or deployment. Runs on PRs and non-main branch pushes.

name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches-ignore: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR title check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Validate PR title
        run: |
          echo "${{ github.event.pull_request.title }}" | pnpm exec commitlint

  # Detect which paths changed so we can run jobs conditionally.
  # For PRs from forks, GITHUB_TOKEN has restricted API access; we set all outputs true so full CI runs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes_filter.outputs.api || steps.fork_outputs.outputs.api }}
      web: ${{ steps.changes_filter.outputs.web || steps.fork_outputs.outputs.web }}
      shared: ${{ steps.changes_filter.outputs.shared || steps.fork_outputs.outputs.shared }}
      any: ${{ steps.changes_filter.outputs.any || steps.fork_outputs.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths (same-repo PR or push)
        id: changes_filter
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: dorny/paths-filter@v3
        with:
          # base only for push; on pull_request the action ignores base and uses PR base ref
          base: ${{ github.event_name == 'push' && (github.event.before || 'HEAD~1') || '' }}
          filters: |
            api:
              - "apps/api/**"
            web:
              - "apps/web/**"
            shared:
              - "packages/**"
            any:
              - "apps/api/**"
              - "apps/web/**"
              - "packages/**"
      - name: Set all changes for fork PR (no API access)
        id: fork_outputs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "api=true" >> "$GITHUB_OUTPUT"
          echo "web=true" >> "$GITHUB_OUTPUT"
          echo "shared=true" >> "$GITHUB_OUTPUT"
          echo "any=true" >> "$GITHUB_OUTPUT"

  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Guard Prisma migrations — tenant FK must reference tenants(id)
        run: |
          set -e
          if grep -R 'REFERENCES "tenants"("tenant_id")' apps/api/prisma/migrations --include='*.sql' 2>/dev/null; then
            echo "::error::Invalid FK in migration SQL: use REFERENCES \"tenants\"(\"id\"). The Tenant primary key column is id, not tenant_id."
            exit 1
          fi
          echo "Prisma migration tenant FK guard OK."
      - name: Lint API (and shared if needed)
        run: pnpm run lint --filter=api --filter=@repo/shared

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint Web (and shared if needed)
        run: pnpm run lint --filter=web --filter=@repo/shared

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      JWT_SECRET: test-jwt-secret-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm --filter @repo/shared build
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
      - name: Run migrations
        run: pnpm --filter api exec prisma migrate deploy
      - name: Run API tests
        run: pnpm --filter api test:coverage

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm --filter @repo/shared build
      - name: Run Web tests
        run: pnpm --filter web test:unit

  test-shared:
    name: Test shared package
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run shared package unit tests
        run: pnpm --filter @repo/shared test

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
      - name: Type check
        run: pnpm run check-types

  e2e-web-automation:
    name: E2E Web (automation)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared and API
        run: |
          pnpm --filter @repo/shared build
          pnpm --filter api exec prisma generate
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api exec prisma db seed
          pnpm --filter api build
      - name: Install Playwright Chromium (with system deps for Ubuntu)
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Start API and run automation E2E
        run: |
          set -e
          pnpm --filter api start &
          API_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:4000/health > /dev/null; then
              echo "API healthy"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "API did not become healthy in time"
              kill "$API_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          pnpm --filter web run test:e2e:automation:branching-on
          E2E_AUTOMATION_BRANCHING_OFF=1 pnpm --filter web exec playwright test e2e/automation/event-automations.spec.ts --grep AT-UI-001
          kill "$API_PID" 2>/dev/null || true
          wait "$API_PID" 2>/dev/null || true

  trivy:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.any == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

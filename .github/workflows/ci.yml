# Continuous Integration: lint, test, typecheck, and security scan.
# No Docker build/push or deployment. Runs on PRs and non-main branch pushes.

name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches-ignore: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR title check
    runs-on: self-hosted
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install commitlint
        run: npm install --no-save --no-audit --no-fund --prefix "$RUNNER_TEMP/commitlint" @commitlint/cli@19 @commitlint/config-conventional@19
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          # Let commitlint resolve `extends: ["@commitlint/config-conventional"]`
          # from the temp install, since the config file lives at the repo root.
          NODE_PATH: ${{ runner.temp }}/commitlint/node_modules
        run: |
          printf '%s\n' "$PR_TITLE" | "$RUNNER_TEMP/commitlint/node_modules/.bin/commitlint" --config commitlint.config.js

  # Detect which paths changed so we can run jobs conditionally.
  # For PRs from forks, GITHUB_TOKEN has restricted API access; we set all outputs true so full CI runs.
  changes:
    runs-on: self-hosted
    outputs:
      api: ${{ steps.changes_filter.outputs.api || steps.fork_outputs.outputs.api }}
      web: ${{ steps.changes_filter.outputs.web || steps.fork_outputs.outputs.web }}
      tenant_site: ${{ steps.changes_filter.outputs.tenant_site || steps.fork_outputs.outputs.tenant_site }}
      shared: ${{ steps.changes_filter.outputs.shared || steps.fork_outputs.outputs.shared }}
      any: ${{ steps.changes_filter.outputs.any || steps.fork_outputs.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths (same-repo PR or push)
        id: changes_filter
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: dorny/paths-filter@v3
        with:
          # base only for push; on pull_request the action ignores base and uses PR base ref
          base: ${{ github.event_name == 'push' && (github.event.before || 'HEAD~1') || '' }}
          filters: |
            api:
              - "apps/api/**"
            web:
              - "apps/web/**"
            tenant_site:
              - "apps/tenant-site/**"
            shared:
              - "packages/**"
            any:
              - "apps/api/**"
              - "apps/web/**"
              - "apps/tenant-site/**"
              - "packages/**"
      - name: Set all changes for fork PR (no API access)
        id: fork_outputs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "api=true" >> "$GITHUB_OUTPUT"
          echo "web=true" >> "$GITHUB_OUTPUT"
          echo "tenant_site=true" >> "$GITHUB_OUTPUT"
          echo "shared=true" >> "$GITHUB_OUTPUT"
          echo "any=true" >> "$GITHUB_OUTPUT"

  lint-api:
    name: Lint API
    runs-on: self-hosted
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup omitted — pnpm pre-installed on self-hosted runner.
      # Restore `- uses: pnpm/action-setup@v4` if switching to ubuntu-latest.
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Guard Prisma migrations — tenant FK must reference tenants(id)
        run: |
          set -e
          if grep -R 'REFERENCES "tenants"("tenant_id")' apps/api/prisma/migrations --include='*.sql' 2>/dev/null; then
            echo "::error::Invalid FK in migration SQL: use REFERENCES \"tenants\"(\"id\"). The Tenant primary key column is id, not tenant_id."
            exit 1
          fi
          echo "Prisma migration tenant FK guard OK."
      - name: Lint API (and shared if needed)
        run: pnpm exec turbo run lint --filter=api --filter=@repo/shared
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  lint-web:
    name: Lint Web
    runs-on: self-hosted
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup omitted — pnpm pre-installed on self-hosted runner.
      # Restore `- uses: pnpm/action-setup@v4` if switching to ubuntu-latest.
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Lint Web (and shared if needed)
        run: pnpm exec turbo run lint --filter=web --filter=@repo/shared
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  test-api:
    name: Test API
    runs-on: self-hosted
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    # Postgres 16 runs natively on the self-hosted runner (no port conflict).
    # Redis is started as a Docker service (pre-pulled image, no native conflict).
    #
    # ⚠ Switching back to ubuntu-latest requires these changes:
    #   1. Restore the postgres Docker service block (image: postgres:16, POSTGRES_USER/PASSWORD/DB, port 5432:5432)
    #   2. Change DATABASE_URL back to: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
    #   3. Restore `- uses: pnpm/action-setup@v4` before setup-node (blank VM has no pnpm)
    #   4. Restore `cache: "pnpm"` under setup-node (no persistent store on GitHub-hosted)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci_runner:ci_runner_pass@localhost:5432/ims_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup and setup-node cache omitted — Node 20 + pnpm are pre-installed
      # on the self-hosted runner and wired into PATH via ~/actions-runner/.env.
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
      - name: Drop and recreate test database
        # The self-hosted runner uses a persistent Postgres instance, so the
        # ims_test DB accumulates state across runs. A cancelled job can leave a
        # migration "started but not finished" in _prisma_migrations (P3009),
        # blocking all subsequent migrate deploy calls. Dropping and recreating
        # the DB gives a guaranteed clean slate without needing migrate reset.
        run: |
          psql postgresql://ci_runner:ci_runner_pass@localhost:5432/postgres \
            -c "DROP DATABASE IF EXISTS ims_test;" \
            -c "CREATE DATABASE ims_test;"
      - name: Run migrations
        run: pnpm --filter api exec prisma migrate deploy
      - name: Run API tests
        run: pnpm exec turbo run test:coverage --filter=api
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  test-web:
    name: Test Web
    runs-on: self-hosted
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup omitted — pnpm pre-installed on self-hosted runner.
      # Restore `- uses: pnpm/action-setup@v4` if switching to ubuntu-latest.
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run Web tests
        run: pnpm exec turbo run test:unit --filter=web
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  lint-tenant-site:
    name: Lint tenant-site
    runs-on: self-hosted
    needs: [changes]
    if: needs.changes.outputs.tenant_site == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint tenant-site (and shared if needed)
        run: pnpm exec turbo run lint --filter=tenant-site --filter=@repo/shared
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  test-tenant-site:
    name: Test tenant-site
    runs-on: self-hosted
    needs: [changes]
    if: needs.changes.outputs.tenant_site == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tenant-site unit tests
        run: pnpm exec turbo run test:run --filter=tenant-site
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      - name: Build tenant-site
        # Catches runtime errors that tsc --noEmit misses (e.g. Next.js route
        # type generation drift, missing "use client" directives, etc.). Cheap
        # after a warm pnpm cache.
        run: pnpm exec turbo run build --filter=tenant-site
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
          # Build-time stub — the renderer only needs the URL shape for
          # next.config, the actual upstream is set at runtime on the host.
          API_INTERNAL_URL: "http://api.internal/api/v1"

  test-shared:
    name: Test shared package
    runs-on: self-hosted
    needs: [changes]
    if: needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run shared package unit tests
        run: pnpm exec turbo run test --filter=@repo/shared
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  typecheck:
    name: Type check
    runs-on: self-hosted
    needs: [changes]
    # `any` includes tenant-site since Phase C.4, so a tenant-site-only change
    # still triggers the global typecheck.
    if: needs.changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup omitted — pnpm pre-installed on self-hosted runner.
      # Restore `- uses: pnpm/action-setup@v4` if switching to ubuntu-latest.
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
      - name: Type check
        run: pnpm exec turbo run check-types
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  e2e-web-automation:
    name: E2E Web (automation)
    runs-on: self-hosted
    timeout-minutes: 45
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    # Postgres 16 runs natively on the self-hosted runner (no port conflict).
    # Redis is started as a Docker service (pre-pulled image, no native conflict).
    #
    # ⚠ Switching back to ubuntu-latest requires these changes:
    #   1. Restore the postgres Docker service block (image: postgres:16, POSTGRES_USER/PASSWORD/DB, port 5432:5432)
    #   2. Change DATABASE_URL back to: postgresql://postgres:postgres@localhost:5432/ims_test?schema=public
    #   3. Restore `- uses: pnpm/action-setup@v4` before setup-node (blank VM has no pnpm)
    #   4. Restore `cache: "pnpm"` under setup-node (no persistent store on GitHub-hosted)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci_runner:ci_runner_pass@localhost:5432/ims_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      # Required by prisma db seed (plan limits + platform admin); ephemeral CI DB only
      SEED_PLATFORM_ADMIN_PASSWORD: ci-e2e-platform-admin-ChangeMe123!
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared and API
        run: |
          pnpm --filter @repo/shared build
          pnpm --filter api exec prisma generate
          psql postgresql://ci_runner:ci_runner_pass@localhost:5432/postgres \
            -c "DROP DATABASE IF EXISTS ims_test;" \
            -c "CREATE DATABASE ims_test;"
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api exec prisma db seed
          pnpm --filter api build
      - name: Resolve Playwright version
        id: playwright_version
        run: |
          VERSION=$(pnpm --filter web exec playwright --version | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright_cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browser (with OS deps)
        if: steps.playwright_cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright_cache.outputs.cache-hit == 'true'
        run: pnpm --filter web exec playwright install-deps chromium
      - name: Start API and run automation E2E
        run: |
          set -e
          pnpm --filter api start &
          API_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:4000/health > /dev/null; then
              echo "API healthy"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "API did not become healthy in time"
              kill "$API_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          pnpm --filter web run test:e2e:automation:branching-on
          E2E_AUTOMATION_BRANCHING_OFF=1 pnpm --filter web exec playwright test e2e/automation/event-automations.spec.ts --grep AT-UI-001
          kill "$API_PID" 2>/dev/null || true
          wait "$API_PID" 2>/dev/null || true

  trivy:
    name: Trivy security scan
    runs-on: self-hosted
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.any == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Trivy vulnerability scanner (filesystem)
        # cache-dir points to /tmp so the DB is never inside the scanned workspace
        # and persists across runs (no forced re-download every time).
        # timeout raised to 15m — the default 5m is not enough for the self-hosted
        # runner to complete a full DB download + fs scan.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          timeout: "15m"
          cache-dir: "/tmp/trivy-cache"

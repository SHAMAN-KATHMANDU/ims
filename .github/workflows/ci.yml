# Continuous Integration: lint, test, typecheck, and security scan.
# No Docker build/push or deployment. Runs on every push and pull_request.

name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed so we can run jobs conditionally.
  # For PRs from forks, GITHUB_TOKEN has restricted API access; we set all outputs true so full CI runs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes_filter.outputs.api || steps.fork_outputs.outputs.api }}
      web: ${{ steps.changes_filter.outputs.web || steps.fork_outputs.outputs.web }}
      shared: ${{ steps.changes_filter.outputs.shared || steps.fork_outputs.outputs.shared }}
      any: ${{ steps.changes_filter.outputs.any || steps.fork_outputs.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths (same-repo PR or push)
        id: changes_filter
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: dorny/paths-filter@v3
        with:
          # base only for push; on pull_request the action ignores base and uses PR base ref
          base: ${{ github.event_name == 'push' && (github.event.before || 'HEAD~1') || '' }}
          filters: |
            api:
              - "apps/api/**"
            web:
              - "apps/web/**"
            shared:
              - "packages/**"
            any:
              - "apps/api/**"
              - "apps/web/**"
              - "packages/**"
      - name: Set all changes for fork PR (no API access)
        id: fork_outputs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "api=true" >> "$GITHUB_OUTPUT"
          echo "web=true" >> "$GITHUB_OUTPUT"
          echo "shared=true" >> "$GITHUB_OUTPUT"
          echo "any=true" >> "$GITHUB_OUTPUT"

  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint API (and shared if needed)
        run: pnpm run lint --filter=api --filter=@repo/shared

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint Web (and shared if needed)
        run: pnpm run lint --filter=web --filter=@repo/shared

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API tests
        run: pnpm run test --filter=api 2>/dev/null || true
        continue-on-error: true

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Web tests
        run: pnpm run test --filter=web 2>/dev/null || true
        continue-on-error: true

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Uses pnpm version from package.json "packageManager" to avoid mismatch
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
      - name: Type check
        run: pnpm run check-types

  trivy:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.any == 'true'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
      - name: Upload Trivy scan results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

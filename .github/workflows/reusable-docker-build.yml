# Reusable workflow: build and push a single Docker image to Docker Hub.
# Called by build-push-dev.yml and build-push-prod.yml. No deployment or SSH.

name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name (e.g. username/dev-api-ims)"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile from repo root"
        required: true
        type: string
      environment:
        description: "Environment: dev or prod (prod adds :latest tag)"
        required: true
        type: string
      app_name:
        description: "App name for concurrency (e.g. api, web)"
        required: true
        type: string
      commit_sha:
        description: "Commit SHA for tagging (e.g. env-commit_sha)"
        required: true
        type: string
      ref:
        description: "Git ref to checkout (commit SHA or branch)"
        required: true
        type: string
      create_env_file:
        description: "Create apps/web/.env before build (for web app)"
        required: false
        type: boolean
        default: false
      env_content:
        description: "Content for apps/web/.env when create_env_file is true"
        required: false
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-and-push:
    name: Build and push ${{ inputs.app_name }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    concurrency: docker-build-${{ inputs.app_name }}-${{ inputs.environment }}-${{ inputs.commit_sha }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Create environment file for Web (optional)
        if: inputs.create_env_file == true && inputs.env_content != ''
        run: |
          mkdir -p apps/web
          printf '%s\n' "${{ inputs.env_content }}" > apps/web/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build tags list: env and env-sha always; :latest only for prod
      - name: Prepare image tags
        id: tags
        run: |
          TAGS="${{ inputs.image_name }}:${{ inputs.environment }}"
          TAGS="${TAGS}"$'\n'"${{ inputs.image_name }}:${{ inputs.environment }}-${{ inputs.commit_sha }}"
          if [ "${{ inputs.environment }}" = "prod" ]; then
            TAGS="${TAGS}"$'\n'"${{ inputs.image_name }}:latest"
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

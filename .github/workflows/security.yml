# Security: Trivy filesystem scan for CRITICAL/HIGH CVEs.
# Triggered on push to main, weekly schedule, and manual dispatch.
# Per-PR Trivy was removed from ci.yml to save Actions minutes; pre-deploy +
# weekly cron is the right cadence for catching newly-disclosed CVEs.
# Body lifted from the previous `trivy` job in ci.yml.
# ⚠ To switch back to the self-hosted runner: replace `runs-on: ubuntu-latest` with `runs-on: self-hosted`.

name: Security

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".claude/**"
      - ".vscode/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"
  schedule:
    # Weekly, Monday 04:00 UTC
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run Trivy vulnerability scanner (filesystem)
        # cache-dir points to /tmp so the DB is never inside the scanned workspace
        # and persists across runs (no forced re-download every time).
        # timeout raised to 15m — the default 5m is not enough for the self-hosted
        # runner to complete a full DB download + fs scan.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          timeout: "15m"
          cache-dir: "/tmp/trivy-cache"

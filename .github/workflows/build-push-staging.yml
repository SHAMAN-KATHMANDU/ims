# Build and push Docker images for staging. Tags: dev, dev-{commit_sha}.
# ⚠ To switch back to the self-hosted runner: replace every `runs-on: ubuntu-latest`
#   with `runs-on: self-hosted`, and re-serialize the builds (api → web → tenant-site)
#   to avoid concurrent BuildKit daemons exhausting the runner's ~1.4 GB of free RAM:
#     build-web:        needs: [changes, build-api]    + add the `build-api.result == 'success' || skipped` guard back
#     build-tenant-site:needs: [changes, build-web]    + add the `build-web.result == 'success' || skipped` guard back
# Triggered by push to main or manual dispatch. Push to main fires when PRs are merged.
# Watchtower on staging EC2 pulls :dev and restarts. No deployment or SSH.
#
# Builds run in PARALLEL on ubuntu-latest — each GitHub-hosted runner has its own VM,
# so concurrent BuildKit daemons no longer share a memory ceiling.
#
# Manual trigger (Actions → Run workflow):
#   stage = "api"          → builds API only          (always, regardless of file changes)
#   stage = "web"          → builds Web only          (always, regardless of file changes)
#   stage = "tenant-site"  → builds tenant-site only  (always, regardless of file changes)
#   stage = "all"          → builds all three         (always, regardless of file changes)
#
# Push to main: only builds what changed (apps/api, apps/web, apps/tenant-site, packages).

name: Build and Push (Staging)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: "Which stage to build and push"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - api
          - web
          - tenant-site

permissions:
  contents: read

concurrency:
  group: build-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  COMMIT_SHA: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Only runs on push — detects which paths changed.
  # Skipped entirely on workflow_dispatch (manual builds always run unconditionally).
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes_filter.outputs.api }}
      web: ${{ steps.changes_filter.outputs.web }}
      tenant_site: ${{ steps.changes_filter.outputs.tenant_site }}
      shared: ${{ steps.changes_filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          # Full history is needed so paths-filter can resolve both the
          # `before` and `after` commits on squash merges. With a shallow
          # clone it falls back to comparing the checked-out SHA to the
          # `main` branch ref (which may resolve to the same commit locally),
          # yielding 0 changed files and silently skipping every build.
          fetch-depth: 0
      - name: Detect changed paths
        id: changes_filter
        uses: dorny/paths-filter@v3
        with:
          # Pin base/ref explicitly to the push event's before/after so we
          # don't depend on the action inferring `main` from local refs.
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            api:
              - "apps/api/**"
            web:
              - "apps/web/**"
            tenant_site:
              - "apps/tenant-site/**"
            shared:
              - "packages/**"

  build-api:
    name: Build API (staging)
    runs-on: ubuntu-latest
    needs: [changes]
    # On manual dispatch: always run when stage is 'api' or 'all'.
    # On push: run when the changes job detected api or shared file changes.
    # needs.[changes] is skipped on dispatch so always() lets this job proceed.
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && (inputs.stage == 'api' || inputs.stage == 'all')) ||
        (github.event_name == 'push' && needs.changes.result == 'success' && (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'))
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-api-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      # GHA cache (cache-from/to) can occasionally return 502 from GitHub.
      # If builds fail with "failed to parse error response 502", retry first.
      # To avoid cache-related failures, temporarily comment out cache-from/cache-to.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=staging-api
          cache-to: type=gha,mode=min,scope=staging-api

  build-web:
    name: Build Web (staging)
    runs-on: ubuntu-latest
    needs: [changes]
    # On manual dispatch: always run when stage is 'web' or 'all'.
    # On push: run when the changes job detected web or shared file changes.
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && (inputs.stage == 'web' || inputs.stage == 'all')) ||
        (github.event_name == 'push' && needs.changes.result == 'success' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'))
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Parse DEV_UI env vars into build args
        id: dev_ui
        run: |
          # Extract public web env vars from the DEV_UI GitHub variable
          API_URL=$(printf '%s\n' "${{ vars.DEV_UI }}" | grep '^NEXT_PUBLIC_API_URL=' | cut -d'=' -f2-)
          APP_ENV=$(printf '%s\n' "${{ vars.DEV_UI }}" | grep '^NEXT_PUBLIC_APP_ENV=' | cut -d'=' -f2-)
          FEATURE_FLAGS=$(printf '%s\n' "${{ vars.DEV_UI }}" | grep '^NEXT_PUBLIC_FEATURE_FLAGS=' | cut -d'=' -f2-)
          echo "next_public_api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "next_public_app_env=${APP_ENV}" >> "$GITHUB_OUTPUT"
          echo "next_public_feature_flags=${FEATURE_FLAGS}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-web-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.dev_ui.outputs.next_public_api_url }}
            NEXT_PUBLIC_APP_ENV=${{ steps.dev_ui.outputs.next_public_app_env }}
            NEXT_PUBLIC_FEATURE_FLAGS=${{ steps.dev_ui.outputs.next_public_feature_flags }}
          cache-from: type=gha,scope=staging-web
          cache-to: type=gha,mode=min,scope=staging-web

  build-tenant-site:
    name: Build Tenant Site (staging)
    runs-on: ubuntu-latest
    needs: [changes]
    # On manual dispatch: run when stage is 'tenant-site' or 'all'.
    # On push: run when the changes job detected tenant-site or shared file changes.
    # Tenant-site is a thin SSR renderer that fetches /public/* from the API at
    # request time; it also depends on @repo/shared for the EnvFeature enum and
    # a few shared types, so a packages/** change triggers a rebuild.
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && (inputs.stage == 'tenant-site' || inputs.stage == 'all')) ||
        (github.event_name == 'push' && needs.changes.result == 'success' && (needs.changes.outputs.tenant_site == 'true' || needs.changes.outputs.shared == 'true'))
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-tenant-site-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/tenant-site/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=staging-tenant-site
          cache-to: type=gha,mode=min,scope=staging-tenant-site

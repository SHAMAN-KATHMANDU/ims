# Build and push Docker images for staging. Tags: dev, dev-{commit_sha}.
# Triggered by push to main or manual dispatch. Push to main fires when PRs are merged.
# Watchtower on staging EC2 pulls :dev and restarts. No deployment or SSH.
#
# Manual trigger (Actions → Run workflow):
#   stage = "api"  → builds API only
#   stage = "web"  → builds Web only
#   stage = "all"  → builds both

name: Build and Push (Staging)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: "Which stage to build and push"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - api
          - web

permissions:
  contents: read

concurrency:
  group: build-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  COMMIT_SHA: ${{ github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes_filter.outputs.api }}
      web: ${{ steps.changes_filter.outputs.web }}
      shared: ${{ steps.changes_filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Detect changed paths
        id: changes_filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before || 'HEAD~1' }}
          filters: |
            api:
              - "apps/api/**"
            web:
              - "apps/web/**"
            shared:
              - "packages/**"

  build-api:
    name: Build API (staging)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.stage == 'api' || inputs.stage == 'all')) ||
      (github.event_name == 'push' && (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-api-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web (staging)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.stage == 'web' || inputs.stage == 'all')) ||
      (github.event_name == 'push' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Parse DEV_UI env vars into build args
        id: dev_ui
        run: |
          # Extract NEXT_PUBLIC_API_URL from the DEV_UI GitHub variable
          API_URL=$(printf '%s\n' "${{ vars.DEV_UI }}" | grep '^NEXT_PUBLIC_API_URL=' | cut -d'=' -f2-)
          echo "next_public_api_url=${API_URL}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-web-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.dev_ui.outputs.next_public_api_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Build and push Docker images for staging. Tags: dev, dev-{commit_sha}.
# Triggered by push to main or manual dispatch. Push to main fires when PRs are merged.
# Watchtower on staging EC2 pulls :dev and restarts. No deployment or SSH.

name: Build and Push (Staging)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Build and push API image"
        required: false
        type: boolean
        default: true
      deploy_web:
        description: "Build and push Web image"
        required: false
        type: boolean
        default: true
      force_deploy:
        description: "Build all images regardless of changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  COMMIT_SHA: ${{ github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes_filter.outputs.api }}
      web: ${{ steps.changes_filter.outputs.web }}
      shared: ${{ steps.changes_filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Detect changed paths
        id: changes_filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before || 'HEAD~1' }}
          filters: |
            api:
              - "apps/api/**"
            web:
              - "apps/web/**"
            shared:
              - "packages/**"

  build-api:
    name: Build API (staging)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.deploy_api || inputs.force_deploy)) ||
      (github.event_name == 'push' && (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-api-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web (staging)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.deploy_web || inputs.force_deploy)) ||
      (github.event_name == 'push' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Create environment file for Web
        run: |
          mkdir -p apps/web
          printf '%s\n' "${{ vars.DEV_UI }}" > apps/web/.env
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-web-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:dev-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Build and push Docker images for production. Tags: prod, prod-{commit_sha}, latest.
# Triggered by push to main/master, merged PRs into those branches, or manual dispatch.
# Requires manual approval via environment prod-approval unless skip_approval is true.
# No deployment or SSH.

name: Build and Push (Prod)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [closed]
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Build and push API image"
        required: false
        type: boolean
        default: true
      deploy_web:
        description: "Build and push Web image"
        required: false
        type: boolean
        default: true
      force_deploy:
        description: "Build all images regardless of changes"
        required: false
        type: boolean
        default: false
      skip_approval:
        description: "Skip manual approval (use with caution)"
        required: false
        type: boolean
        default: false

concurrency:
  group: build-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}
          filters: |
            api:
              - "apps/api/**"
            web:
              - "apps/web/**"
            shared:
              - "packages/**"

  # Build API with approval (environment protection)
  build-api:
    name: Build API (prod)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event.inputs.skip_approval != 'true' &&
      ((github.event_name == 'workflow_dispatch' && (inputs.deploy_api || inputs.force_deploy)) ||
       (github.event_name == 'push' && (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true')) ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true && (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true')))
    environment: prod-approval
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-api-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:prod" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:prod-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build API without approval (when skip_approval is true)
  build-api-skip-approval:
    name: Build API (prod, skip approval)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event.inputs.skip_approval == 'true' &&
      ((github.event_name == 'workflow_dispatch' && (inputs.deploy_api || inputs.force_deploy)) ||
       (github.event_name == 'push' && (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true')) ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true && (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true')))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-api-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:prod" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:prod-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build Web with approval
  build-web:
    name: Build Web (prod)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event.inputs.skip_approval != 'true' &&
      ((github.event_name == 'workflow_dispatch' && (inputs.deploy_web || inputs.force_deploy)) ||
       (github.event_name == 'push' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true')) ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true')))
    environment: prod-approval
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
      - name: Create environment file for Web
        run: |
          mkdir -p apps/web
          printf '%s\n' "${{ vars.PROD_UI }}" > apps/web/.env
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-web-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:prod" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:prod-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build Web without approval
  build-web-skip-approval:
    name: Build Web (prod, skip approval)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event.inputs.skip_approval == 'true' &&
      ((github.event_name == 'workflow_dispatch' && (inputs.deploy_web || inputs.force_deploy)) ||
       (github.event_name == 'push' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true')) ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true')))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
      - name: Create environment file for Web
        run: |
          mkdir -p apps/web
          printf '%s\n' "${{ vars.PROD_UI }}" > apps/web/.env
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/dev-web-ims"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:prod" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:prod-${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

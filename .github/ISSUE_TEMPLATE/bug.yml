name: Bug Report
description: Report a bug
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: One-line description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1.\n2.\n3."
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      placeholder: "Expected:\nActual:"
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser, version

name: Customer Feedback
description: Feedback from users, support, or sales — feature ideas, pain points, or praise
title: "[Feedback]: "
labels: ["feedback", "needs-triage"]
assignees: []
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line summary of the feedback
      placeholder: "e.g. Customers want bulk delete for warehouses"
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Source
      description: Where did this feedback come from?
      options:
        - User — Direct from end user
        - Support — From support tickets
        - Sales — From sales team / prospects
        - Internal — From team or stakeholders
        - Other
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: Full feedback — quote if possible, include context
      placeholder: |
        "[Quote or paraphrase of what was said]"

        Context: [When/where/how was this raised?]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Urgency or importance
      options:
        - Low — Nice to have
        - Medium — Important, multiple users
        - High — Critical for retention or sales
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact / Affected Users
      description: Who is affected? How many? What's the business impact?
      placeholder: |
        - 5+ support tickets in last month
        - Mentioned by 2 enterprise prospects
        - Blocks adoption for [use case]
  - type: textarea
    id: action
    attributes:
      label: Suggested Action
      description: Proposed next steps — new feature, docs update, etc.
  - type: markdown
    attributes:
      value: "**Suggested labels:** `feedback` `needs-triage` — may spawn `enhancement` or `bug` issues"

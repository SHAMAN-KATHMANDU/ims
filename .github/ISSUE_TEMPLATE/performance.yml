name: Performance Issue
description: Report slow or resource-heavy behavior
title: "[Perf]: "
labels: ["performance"]
assignees: []
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: One-line description
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where
      placeholder: Page, API, or component
  - type: textarea
    id: observed
    attributes:
      label: Observed
      placeholder: Slow response, high memory, etc.
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Load, data size

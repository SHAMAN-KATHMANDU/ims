# Dev stack for EC2 -- uses images from Docker Hub (tag :dev).
# Watchtower (see watchtower.yml) polls every 30s for new :dev images and restarts dev_web / dev_api.
#
# One-time host setup:
#   mkdir -p /home/ubuntu/backups
#
# Usage:
#   ./up.sh      -- start everything
#   ./down.sh    -- stop everything
#   ./restart.sh -- restart all or a specific service

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  dev_db:
    image: postgres:16
    container_name: dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ims}
    volumes:
      - dev_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"
    networks:
      - dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Automated Database Backups (daily; same pattern as prod)
  # Backups stored in /home/ubuntu/backups (bind mount).
  # Offsite copy: ./setup-backups.sh then cron runs ./backup-s3.sh
  # ============================================
  dev_db_backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: dev_db_backup
    restart: unless-stopped
    depends_on:
      dev_db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: dev_db
      POSTGRES_DB: ${POSTGRES_DB:-ims}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "--clean --if-exists --no-owner --no-privileges"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
      HEALTHCHECK_PORT: 8080
    volumes:
      - dev_db_backups:/backups
    networks:
      - dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ============================================
  # Redis (BullMQ queues + Socket.IO adapter)
  # ============================================
  dev_redis:
    image: redis:7-alpine
    container_name: dev_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - dev_redis_data:/data
    networks:
      - dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API Server
  # ============================================
  dev_api:
    image: rpandox/dev-api-ims:dev
    container_name: dev_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      dev_db:
        condition: service_healthy
      dev_redis:
        condition: service_healthy
    networks:
      - dev
    # node:20-alpine API image has no wget/curl — use Node for the probe
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Web Frontend
  # ============================================
  dev_web:
    image: rpandox/dev-web-ims:dev
    container_name: dev_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      dev_api:
        condition: service_healthy
    networks:
      - dev

  # ============================================
  # Tenant Site Renderer (Next.js SSR, multi-tenant by Host header)
  # Gated by EnvFeature.TENANT_WEBSITES on the API side. Started only with
  # the `websites` compose profile so existing stacks are unaffected.
  #   docker compose --profile websites up -d
  # ============================================
  dev_tenant_site:
    image: rpandox/dev-tenant-site-ims:dev
    container_name: dev_tenant_site
    restart: unless-stopped
    profiles: ["websites"]
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      HOSTNAME: 0.0.0.0
      # Server-to-server API URL (inside docker network)
      API_INTERNAL_URL: http://dev_api:4000/api/v1
      # Public API origin used when rendering absolute URLs
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      NODE_ENV: production
    depends_on:
      dev_api:
        condition: service_healthy
    networks:
      - dev
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3100/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Caddy reverse proxy (tenant custom domains, on_demand_tls)
  # Holds :443 on the host when the `websites` profile is active. The
  # existing host nginx is retired from the TLS path on dev as part of the
  # cutover (see deploy/dev/setup-caddy.sh). Not started by default.
  #   docker compose --profile websites up -d
  # ============================================
  dev_caddy:
    image: caddy:2.8-alpine
    container_name: dev_caddy
    restart: unless-stopped
    profiles: ["websites"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    depends_on:
      - dev_api
      - dev_web
      - dev_tenant_site
    networks:
      - dev

networks:
  dev:
    driver: bridge
    name: ims-dev

volumes:
  dev_db_data:
  dev_redis_data:
  caddy_data:
  caddy_config:
  dev_db_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ubuntu/backups

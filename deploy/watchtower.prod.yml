# Run on prod EC2: watches prod_web and prod_api for new :prod images and restarts them.
# Usage: docker compose -f docker-compose.prod.yml -f watchtower.prod.yml up -d
# Or run after app stack: docker compose -f watchtower.prod.yml up -d

services:
  watchtower:
    container_name: watchtower-prod
    image: nickfedor/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    environment:
      WATCHTOWER_POLL_INTERVAL: 30
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_WARN_ON_HEAD_FAILURE: "never"
    command: --interval 30 prod_web prod_api
    networks:
      - prod

networks:
  prod:
    external: true
    name: deploy_prod

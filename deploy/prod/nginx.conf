# Nginx config for PROD EC2 instance
# Domains: app.shamanyantra.com (web) + api.shamanyantra.com (api)
# Apex + www redirect to app.
#
# Setup: run ./setup-nginx.sh (handles install, symlink, certbot)
# Manual:
#   sudo cp nginx.conf /etc/nginx/sites-available/ims-prod.conf
#   sudo ln -s /etc/nginx/sites-available/ims-prod.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d app.shamanyantra.com -d api.shamanyantra.com
#
# Cloudflare note: Cloudflare sends HTTPS traffic to origin as HTTP.
# We use X-Forwarded-Proto to detect the original protocol and avoid 301 loops.

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# ============================================================
# Upstreams
# ============================================================
upstream ims_web_prod {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream ims_api_prod {
    server 127.0.0.1:4000;
    keepalive 32;
}

# ============================================================
# Web Frontend -- app.shamanyantra.com (canonical)
# ============================================================
server {
    listen 80;
    server_name app.shamanyantra.com www.shamanyantra.com shamanyantra.com;

    # Redirect apex and legacy www to canonical app host
    if ($host = "shamanyantra.com") {
        return 301 https://app.shamanyantra.com$request_uri;
    }
    if ($host = "www.shamanyantra.com") {
        return 301 https://app.shamanyantra.com$request_uri;
    }

    if ($forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }

    location / {
        proxy_pass http://ims_web_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Next.js WebSocket support (required for dev; harmless in prod)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# ============================================================
# API Server -- api.shamanyantra.com
# ============================================================
server {
    listen 80;
    server_name api.shamanyantra.com;

    if ($forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }

    # Allow up to 15MB for file uploads.
    # API multer limit is 10MB; extra headroom ensures multer (not nginx) returns 413.
    client_max_body_size 15m;

    # ----------------------------------------------------------
    # Facebook Messenger Webhooks
    # Path: GET/POST /api/v1/webhooks/:provider
    #
    # GET  -- Meta hub.challenge verification (no auth, no body)
    # POST -- Inbound events signed with X-Hub-Signature-256
    #
    # CRITICAL: proxy_request_buffering off
    #   Express uses express.raw() on this path to get the raw body bytes
    #   for HMAC-SHA256 signature verification (META_APP_SECRET).
    #   If nginx buffers the request, Express may receive a modified body
    #   and signature verification will fail with 401.
    #
    # Meta requires a response within 5 seconds or it retries the POST.
    # Meta App Dashboard webhook URL: https://api.shamanyantra.com/api/v1/webhooks/messenger
    # ----------------------------------------------------------
    location /api/v1/webhooks/ {
        proxy_pass http://ims_api_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        proxy_request_buffering off;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ----------------------------------------------------------
    # Socket.IO WebSocket
    # Path: /ws/ (configured in apps/api/src/config/socket.config.ts)
    #
    # Requires HTTP upgrade headers and long-lived connection timeouts.
    # Socket.IO also uses HTTP long-polling at this path before upgrading.
    # ----------------------------------------------------------
    location /ws/ {
        proxy_pass http://ims_api_prod;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # WebSocket connections are long-lived; disable nginx keepalive timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ----------------------------------------------------------
    # All other API requests (REST endpoints, health, Swagger, uploads)
    # ----------------------------------------------------------
    location / {
        proxy_pass http://ims_api_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

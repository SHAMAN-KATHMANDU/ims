# Watchtower for prod EC2.
# Watches prod_api and prod_web for new :prod images and restarts them automatically.
# Run AFTER the app stack (docker-compose.yml) is already up so the ims-prod network exists.
#
# Usage (managed by up.sh / down.sh):
#   docker compose -f watchtower.yml up -d
#   docker compose -f watchtower.yml down

services:
  watchtower:
    container_name: watchtower-prod
    image: nickfedor/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # 15s on prod so a manually-triggered release (`:prod` push) propagates
      # quickly. Dev stays at 30s — staging pushes are higher-frequency so a
      # longer interval cushions noisy auto-builds. Pushes to `:prod` are
      # gated by the production GitHub environment approval, so there's no
      # risk of an unapproved image getting pulled fast.
      WATCHTOWER_POLL_INTERVAL: 15
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_WARN_ON_HEAD_FAILURE: "never"
    # Only watch the app containers -- not the DB, Redis, backup service, or Watchtower itself.
    # prod_tenant_site is included so website deploys propagate automatically.
    command: --interval 15 prod_web prod_api prod_tenant_site
    networks:
      - prod

networks:
  prod:
    external: true
    name: ims-prod

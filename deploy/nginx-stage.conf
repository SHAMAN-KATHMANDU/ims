# Nginx config for DEV/STAGE EC2 instance
# Place this at: /etc/nginx/sites-available/ims-stage.conf
# Then: sudo ln -s /etc/nginx/sites-available/ims-stage.conf /etc/nginx/sites-enabled/ims-stage.conf
# Then: sudo certbot --nginx -d stage-ims.shamankathmandu.com -d stage-api.shamankathmandu.com

upstream ims_web_stage {
    server 127.0.0.1:3000;
}

upstream ims_api_stage {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name stage-ims.shamankathmandu.com;

    location / {
        proxy_pass http://ims_web_stage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name stage-api.shamankathmandu.com;

    location / {
        proxy_pass http://ims_api_stage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

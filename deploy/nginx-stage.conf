# Nginx config for DEV/STAGE EC2 instance
# Place this at: /etc/nginx/sites-available/ims-stage.conf
# Then: sudo ln -s /etc/nginx/sites-available/ims-stage.conf /etc/nginx/sites-enabled/ims-stage.conf
# Then: sudo certbot --nginx -d stage-ims.shamankathmandu.com -d stage-api.shamankathmandu.com
#
# When behind Cloudflare: only redirect HTTP->HTTPS if the client did not already use HTTPS
# (avoids 301 loop: Cloudflare sends HTTPS traffic to origin as HTTP, so we must not redirect again)

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

upstream ims_web_stage {
    server 127.0.0.1:3000;
}

upstream ims_api_stage {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name stage-ims.shamankathmandu.com;

    # Only redirect to HTTPS when client did not already use HTTPS (e.g. behind Cloudflare)
    if ($forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }

    location / {
        proxy_pass http://ims_web_stage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name stage-api.shamankathmandu.com;

    if ($forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }

    location / {
        proxy_pass http://ims_api_stage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}

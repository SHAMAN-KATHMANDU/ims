# Run on dev EC2: watches dev_web and dev_api for new :dev images and restarts them.
# Usage: docker compose -f docker-compose.dev.yml -f watchtower.dev.yml up -d
# Or run after app stack: docker compose -f watchtower.dev.yml up -d

services:
  watchtower:
    container_name: watchtower-dev
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    environment:
      WATCHTOWER_POLL_INTERVAL: 30
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_WARN_ON_HEAD_FAILURE: "never"
    command: --interval 30 dev_web dev_api
    networks:
      - dev

networks:
  dev:
    external: true
    name: deploy_dev

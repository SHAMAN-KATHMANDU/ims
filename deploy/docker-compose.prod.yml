# Prod stack for EC2 – uses images from Docker Hub (tag :prod).
# Watchtower (see watchtower.prod.yml) pulls new :prod images and restarts prod_web / prod_api.

services:
  prod_db:
    image: postgres:16
    container_name: prod_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ims}
    volumes:
      - prod_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"
    networks:
      - prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prod_redis:
    image: redis:7-alpine
    container_name: prod_redis
    restart: always
    expose:
      - "6379"
    ports:
      - "6379:6379"
    networks:
      - prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prod_minio:
    image: minio/minio:latest
    container_name: prod_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - prod_minio_data:/data
    networks:
      prod:
        aliases:
          - prod-minio

  prod_api:
    image: rpandox/dev-api-ims:prod
    container_name: prod_api
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      prod_db:
        condition: service_healthy
      prod_redis:
        condition: service_healthy
      prod_minio:
        condition: service_started
    networks:
      - prod

  prod_web:
    image: rpandox/dev-web-ims:prod
    container_name: prod_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: "3000" # override .env PORT=4000 (API only); Next.js must listen on 3000
    env_file:
      - .env
    depends_on:
      - prod_api
    networks:
      - prod

  # ============================================
  # Database Backup – daily at 2 AM, 7-day retention
  # ============================================
  prod_backup:
    image: prodrigestivill/postgres-backup-local
    container_name: prod_backup
    restart: always
    volumes:
      - prod_backups:/backups
    depends_on:
      prod_db:
        condition: service_healthy
    networks:
      - prod
    environment:
      POSTGRES_HOST: prod_db
      POSTGRES_DB: ${POSTGRES_DB:-ims}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "0 2 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 0
      BACKUP_KEEP_MONTHS: 0

networks:
  prod:
    driver: bridge

volumes:
  prod_db_data:
  prod_backups:
  prod_minio_data:

# Dev stack for EC2 – uses images from Docker Hub (tag :dev).
# Watchtower (see watchtower.dev.yml) pulls new :dev images and restarts dev_web / dev_api.

services:
  dev_db:
    image: postgres:16
    container_name: dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ims}
    volumes:
      - dev_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"
    networks:
      - dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dev_redis:
    image: redis:7-alpine
    container_name: dev_redis
    restart: unless-stopped
    expose:
      - "6379"
    ports:
      - "6379:6379"
    networks:
      - dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dev_minio:
    image: minio/minio:latest
    container_name: dev_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dev_minio_data:/data
    networks:
      dev:
        aliases:
          - dev-minio

  dev_api:
    image: rpandox/dev-api-ims:dev
    container_name: dev_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      dev_db:
        condition: service_healthy
      dev_redis:
        condition: service_healthy
      dev_minio:
        condition: service_started
    networks:
      - dev

  dev_web:
    image: rpandox/dev-web-ims:dev
    container_name: dev_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - dev_api
    networks:
      - dev

networks:
  dev:
    driver: bridge

volumes:
  dev_db_data:
  dev_minio_data:
